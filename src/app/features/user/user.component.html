<!-- users.component.html -->
<app-header></app-header>

<div class="card">      
  <app-generic-table
    title="Users"
    [data]="users"
    [columns]="columns"
    [loading]="loading"
    [crudConfig]="{
      create: true,
      edit: true,
      delete: true
    }"
    (create)="onCreate()"
    (edit)="onEdit($event)"
    (delete)="onDelete($event)">
  </app-generic-table>
</div>
