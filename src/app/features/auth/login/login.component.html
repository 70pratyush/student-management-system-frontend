<div class="auth-container">

  <!-- LEFT SIDE -->
  <div class="auth-left">

    <div class="auth-card">

      <h1>Welcome back</h1>
      <p class="subtitle">Please enter your details</p>

      <div class="field">
        <span class="p-input-icon-left w-full">
          <i class="pi pi-user"></i>
          <input pInputText type="text" placeholder="Enter email">
        </span>
      </div>

      <div class="field">
        <span class="p-input-icon-left w-full">
          <i class="pi pi-lock"></i>
          <input pInputText type="password" [(ngModel)]="password" placeholder="Enter password"/>
        </span>
      </div>

      <p-button label="Sign in" styleClass="login-btn"></p-button>

    </div>

  </div>

  <!-- RIGHT SIDE -->
  <div class="auth-right">

    <img src="assets/images/login-illustration.svg" alt="illustration">

  </div>

</div>
